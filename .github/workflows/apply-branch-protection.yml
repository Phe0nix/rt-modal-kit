name: Apply branch protection

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      administration: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply branch protection for main (require CI)
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'main';
            try {
              await github.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch,
                required_status_checks: {
                  strict: true,
                  contexts: ['ci']
                },
                enforce_admins: true,
                required_pull_request_reviews: {
                  required_approving_review_count: 1
                },
                restrictions: null
              });
              core.info(`Branch protection applied for ${branch}`);
            } catch (err) {
              core.setFailed(`Failed to apply branch protection: ${err}`);
            }
