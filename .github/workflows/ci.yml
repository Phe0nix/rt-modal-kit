name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Environment info
        run: |
          node --version
          npm --version

      - name: Install dependencies (with retries)
        run: |
          set -euo pipefail
          retries=3
          until npm ci; do
            retries=$((retries-1))
            if [ "$retries" -le 0 ]; then
              echo "npm ci failed after retries"
              exit 1
            fi
            echo "npm ci failed, retrying in 3s... ($retries attempts left)"
            sleep 3
          done
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
